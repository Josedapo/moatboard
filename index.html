<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Moatboard — On hold</title>
  <style>
    :root {
      color-scheme: light dark;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #f7f7f5;
      color: #1a1a1a;
    }
    @media (prefers-color-scheme: dark) {
      html, body { background: #111; color: #e8e8e6; }
      .panel { background: #1a1a1a; border-color: #2a2a2a; }
      .meta { color: #888; }
    }
    main {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .panel {
      max-width: 520px;
      background: #fff;
      border: 1px solid #e6e6e2;
      border-radius: 12px;
      padding: 40px 36px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    p {
      margin: 0 0 12px;
      line-height: 1.55;
      font-size: 15px;
    }
    .meta {
      margin-top: 24px;
      font-size: 13px;
      color: #777;
    }
  </style>
</head>
<body>
  <main>
    <div class="panel">
      <h1>Moatboard is on hold.</h1>
      <p>The project is paused while attention shifts elsewhere. Nothing is lost — code, data and ideas are preserved and will return when the moment is right.</p>
      <p class="meta">Last update: May 2026.</p>
    </div>
  </main>
</body>
</html>
